---
- name: Install Vault
  become: true
  ansible.builtin.dnf5:
    name: vault
    state: present

- name: Install DNS tools (dig/nslookup)
  become: true
  ansible.builtin.dnf5:
    name: bind-utils
    state: present

- name: Get UID for {{ vault_user.name }}
  ansible.builtin.command: id -u {{ vault_user.name }}
  register: vault_uid
  changed_when: false

- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vault_user.name }}"
    group: "{{ vault_user.group }}"
    mode: "0755"
  loop:
    - /etc/vault.d
    - /opt/vault/data
    - /etc/vault.d/tls

- name: Check if Vault cert is valid server cert
  command: openssl x509 -in /etc/vault.d/tls/vault.crt -noout -text
  register: vault_cert_check
  failed_when: false
  changed_when: false

- name: Set flag if cert is invalid
  set_fact:
    vault_cert_invalid: "{{ 'CA:TRUE' in vault_cert_check.stdout }}"

- name: Check SAN correctness
  set_fact:
    vault_cert_invalid: >-
      {{
        vault_cert_invalid or
        ('vault.service.consul' not in vault_cert_check.stdout)  or
        ('TLS Web Server Authentication' not in vault_cert_check.stdout) or
        ('home.arpa' not in vault_cert_check.stdout)
      }}

- name: Build SAN IP list
  set_fact:
    vault_san_ips: >-
      {{
        ['127.0.0.1']
        + (ansible_all_ipv4_addresses | default([]))
      }}

- name: Build SAN IP lines
  set_fact:
    vault_san_ip_lines: "{{ query('sequence', 'start=1 count=' ~ vault_san_ips | length) | zip(vault_san_ips) | map('join', ' = ') | map('regex_replace', '^(\\d+) = (.*)$', 'IP.\\1 = \\2') | list }}"

- name: Build SAN DNS lines
  set_fact:
    vault_san_dns_lines:
      - "DNS.1 = {{ ansible_hostname }}"
      - "DNS.2 = {{ inventory_hostname }}"
      - "DNS.3 = vault.service.consul"
      - "DNS.4 = vault.service.consul.home.arpa"
      - "DNS.5 = vault.{{ ansible_hostname }}.home.arpa"

- name: Build SAN lines
  set_fact:
    vault_san_lines: >-
      {{
        ['subjectAltName = @alt_names', '', '[alt_names]']
        + vault_san_dns_lines
        + vault_san_ip_lines
      }}

- name: Create Vault TLS extension config
  ansible.builtin.copy:
    dest: /etc/vault.d/tls/vault.ext
    content: "{{ (
      [
      'basicConstraints=critical,CA:FALSE',
      'keyUsage = critical, keyCertSign, cRLSign, digitalSignature, keyEncipherment',
      'extendedKeyUsage = serverAuth',
      ''
      ]
      + vault_san_lines
      ) | join('\n') + '\n' }}"
    mode: "0644"

- name: Generate bootstrap Vault key
  ansible.builtin.command: >
    openssl genrsa -out /etc/vault.d/tls/vault.key 4096
  args:
    creates: /etc/vault.d/tls/vault.key
  when: vault_cert_invalid or not lookup('file', '/etc/vault.d/tls/vault.crt', errors='ignore')

- name: Generate bootstrap CSR
  ansible.builtin.command: >
    openssl req -new
    -key /etc/vault.d/tls/vault.key
    -out /etc/vault.d/tls/vault.csr
    -subj "/CN={{ ansible_hostname }}"
  args:
    creates: /etc/vault.d/tls/vault.csr
  when: vault_cert_invalid or not lookup('file', '/etc/vault.d/tls/vault.crt', errors='ignore')

- name: Generate self-signed bootstrap cert
  ansible.builtin.command: >
    openssl x509 -req
    -in /etc/vault.d/tls/vault.csr
    -signkey /etc/vault.d/tls/vault.key
    -out {{ nomad_server.vault.crt_path }}
    -days 3650
    -extfile /etc/vault.d/tls/vault.ext
  args:
    creates: "{{ nomad_server.vault.crt_path }}"
  when: vault_cert_invalid or not lookup('file', '/etc/vault.d/tls/vault.crt', errors='ignore')

- name: Set vault.key file permissions
  ansible.builtin.file:
    path: "/etc/vault.d/tls/vault.key"
    owner: "{{ vault_user.name }}"
    group: "{{ vault_user.group }}"
    mode: "0600"

- name: Set vault.crt file permissions
  ansible.builtin.file:
    path: "{{nomad_server.vault.crt_path}}"
    owner: "{{ vault_user.name }}"
    group: "{{ vault_user.group }}"
    mode: "0640"

- name: Trust Vault self-signed certificate system-wide
  become: true
  ansible.builtin.copy:
    src: "{{nomad_server.vault.crt_path}}"
    dest: /etc/pki/ca-trust/source/anchors/vault.crt
    remote_src: true
    mode: "0644"
  notify: Update OS CA trust immediately

- name: Vault config
  ansible.builtin.template:
    src: "{{ role_path }}/templates/vault.hcl.j2"
    dest: /etc/vault.d/vault.hcl
    owner: "{{ vault_user.name }}"
    group: "{{ vault_user.group }}"
    mode: "0640"

- name: Enable and start Vault service
  ansible.builtin.systemd:
    name: vault.service
    enabled: true
    state: started
    daemon_reload: true
    no_block: false

- name: Deploy vault auto-unseal script from template
  ansible.builtin.template:
    src: vault-auto-unseal.sh.j2
    dest: /usr/local/sbin/vault-auto-unseal.sh
    owner: root
    group: root
    mode: "0700"
  no_log: true

- name: Deploy vault auto-unseal systemd unit from template
  ansible.builtin.template:
    src: vault-auto-unseal.service.j2
    dest: /etc/systemd/system/vault-auto-unseal.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable vault auto-unseal service
  ansible.builtin.systemd:
    name: vault-auto-unseal.service
    enabled: true

- name: Run vault auto-unseal now
  ansible.builtin.systemd:
    name: vault-auto-unseal.service
    state: started

- name: Force restart Vault to register with Consul
  ansible.builtin.systemd:
    name: vault
    state: restarted
    daemon_reload: true

- name: Check Vault status
  ansible.builtin.command: vault status -format=json
  environment:
    VAULT_ADDR: "https://127.0.0.1:8200"
    VAULT_SKIP_VERIFY: "true"
  register: vault_status
  failed_when: false
  changed_when: false

- name: Parse Vault status JSON
  ansible.builtin.set_fact:
    vault_status_parsed: "{{ vault_status.stdout | default('{}') | from_json }}"

- name: Print Vault status
  ansible.builtin.debug:
    msg: "{{ vault_status_parsed }}"

- name: Unseal Vault (Loops through keys until unsealed)
  ansible.builtin.command: "vault operator unseal {{ item }}"
  loop: "{{ nomad_server.vault.unseal_keys }}"
  when: vault_status_parsed.sealed | bool
  environment:
    VAULT_ADDR: "https://127.0.0.1:8200"
  register: vault_unseal_result
  no_log: false
  changed_when: false

- name: Verify Vault is now unsealed
  ansible.builtin.command: vault status -format=json
  environment:
    VAULT_SKIP_VERIFY: "true"
    VAULT_ADDR: "https://127.0.0.1:8200"
  register: vault_status_after
  changed_when: false
  failed_when: false

- name: Parse post-unseal status
  ansible.builtin.set_fact:
    vault_status_after_parsed: "{{ vault_status_after.stdout | default('{}') | from_json }}"

- name: Fail if still sealed
  ansible.builtin.fail:
    msg: "Vault failed to unseal. Status: {{ vault_status_after_parsed }}"
  when: vault_status_after_parsed.sealed | bool

- name: Wait for Vault DNS to resolve
  ansible.builtin.command: dig +short @127.0.0.1 -p 8600 vault.service.consul
  register: vault_dns
  changed_when: false
  retries: 20
  delay: 3
  until: vault_dns.stdout | trim | length > 0

- name: Wait for system resolver to resolve .consul domain
  ansible.builtin.command: getent ahostsv4 {{ nomad_server.vault.hostname }}
  register: vault_resolved_dns
  changed_when: false
  failed_when: false
  retries: 20
  delay: 3
  until: vault_resolved_dns.rc == 0 and (vault_resolved_dns.stdout | length > 0)

- name: Wait for Vault API to be ready via Hostname
  ansible.builtin.uri:
    url: "https://{{ nomad_server.vault.hostname }}:8200/v1/sys/health?standbyok=true"
    method: GET
    validate_certs: true
    status_code: [200, 429]
  register: vault_health
  until: vault_health.status in [200, 429]
  retries: 30
  delay: 5

- name: Check Vault status via Hostname
  ansible.builtin.command: vault status -format=json
  environment:
    VAULT_ADDR: "https://{{ nomad_server.vault.hostname }}:8200"
  register: vault_final_vault_status
  changed_when: false
  failed_when: false

- name: Check Vault service registration in Consul
  ansible.builtin.command: consul catalog services
  register: vault_consul_services
  changed_when: false
  failed_when: "'vault' not in vault_consul_services.stdout"

- name: Debug Vault status
  ansible.builtin.debug:
    msg: >
      Vault is fully unsealed, healthy, and resolvable!
      Registered in Consul: {{ 'vault' in vault_consul_services.stdout }}
      Vault DNS IP: {{ vault_dns.stdout | trim }}
