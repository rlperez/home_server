---
- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ nomad_server.nomad.user.name }}"
    group: "{{ nomad_server.nomad.user.group }}"
    mode: "0755"
  loop:
    - "{{ coredns_config.path }}"
    - "{{ coredns_config.nomad_job_path | dirname }}"

- name: Disable systemd-resolved stub listener (free port 53 FIRST)
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/00-no-stub.conf
    mode: "0644"
    content: |
      [Resolve]
      DNSStubListener=no

- name: Configure upstream DNS for resolved
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/10-upstream.conf
    mode: "0644"
    content: |
      [Resolve]
      DNS=9.9.9.9 149.112.112.112
      FallbackDNS=1.1.1.2 1.0.0.2

- name: Restart systemd-resolved (apply config once)
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted
    enabled: true

- name: Ensure resolv.conf is managed by resolved
  ansible.builtin.file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true

- name: Render CoreDNS Corefile
  ansible.builtin.template:
    src: "{{ role_path }}/templates/Corefile.j2"
    dest: "{{ coredns_config.path }}/Corefile"
    owner: "{{ nomad_server.nomad.user.name }}"
    group: "{{ nomad_server.nomad.user.group }}"
    mode: "0644"

- name: Render CoreDNS zone file
  ansible.builtin.template:
    src: "{{ role_path }}/templates/home.arpa.db.j2"
    dest: "{{ coredns_config.path }}/home.arpa.db"
    owner: "{{ nomad_server.nomad.user.name }}"
    group: "{{ nomad_server.nomad.user.group }}"
    mode: "0644"

- name: Render Nomad job file
  ansible.builtin.template:
    src: "{{ role_path }}/templates/coredns.nomad.j2"
    dest: "{{ coredns_config.nomad_job_path }}"
    owner: "{{ nomad_server.nomad.user.name }}"
    group: "{{ nomad_server.nomad.user.group }}"
    mode: "0644"

- name: Render Nomad job file
  ansible.builtin.template:
    src: "{{ role_path }}/templates/coredns.nomad.j2"
    dest: "{{ coredns_config.nomad_job_path }}"
    owner: "{{ nomad_server.nomad.user.name }}"
    group: "{{ nomad_server.nomad.user.group }}"
    mode: "0644"

- name: Read Nomad bootstrap token from remote server
  ansible.builtin.slurp:
    src: /etc/nomad.d/nomad-management-token.txt
  register: nomad_token_slurp
  no_log: true

- name: Set Nomad token fact
  ansible.builtin.set_fact:
    nomad_management_token: "{{ (nomad_token_slurp.content | b64decode | from_json).SecretID }}"
  no_log: true

- name: Check if firewalld is running
  ansible.builtin.command: firewall-cmd --state
  register: firewalld_state
  changed_when: false
  failed_when: false

- name: Open DNS service in firewalld
  ansible.posix.firewalld:
    service: dns
    permanent: true
    state: enabled
    immediate: true
  when: firewalld_state.stdout == "running"

- name: Get current active connection name for interface {{ ansible_default_ipv4.interface }}
  ansible.builtin.command: "nmcli -g GENERAL.CONNECTION device show {{ ansible_default_ipv4.interface }}"
  register: active_conn
  changed_when: false

- name: Add IPv6 ULA address to network interface
  community.general.nmcli:
    conn_name: "{{ active_conn.stdout }}"
    type: wifi
    ssid: "{{ active_conn.stdout }}"
    ip6: "fd00:1::{{ '%02x' | format(ansible_facts.default_ipv4.address.split('.')[-1] | int) }}/64"
    method6: manual
    state: present

- name: Restart systemd-resolved (free port 53)
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted

- name: Check port 53 usage
  ansible.builtin.command: ss -ltnup
  register: port_check
  changed_when: false

- debug:
    var: port_check.stdout

- name: Run CoreDNS Nomad job
  ansible.builtin.command: nomad job run {{ coredns_config.nomad_job_path }}
  environment:
    NOMAD_ADDR: "https://127.0.0.1:4646"
    NOMAD_SKIP_VERIFY: true
    NOMAD_TOKEN: "{{ nomad_management_token }}"
  register: nomad_run
  changed_when: true

- name: Wait for CoreDNS TCP
  wait_for:
    host: 127.0.0.1
    port: 53
    timeout: 60

- name: Wait for DNS to actually respond
  command: dig @127.0.0.1 home.arpa
  register: dns_check
  retries: 10
  delay: 3
  until: dns_check.rc == 0

- name: Force systemd-resolved to use CoreDNS only for LAN
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/00-coredns.conf
    mode: "0644"
    content: |
      [Resolve]
      DNS=127.0.0.1
      FallbackDNS=
      Domains=~home.arpa ~consul

- name: Restart systemd-resolved (use CoreDNS)
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted
