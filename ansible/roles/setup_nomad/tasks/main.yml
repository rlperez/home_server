---
- name: Install Nomad
  become: true
  ansible.builtin.dnf5:
    name:
      - nomad
      - nomad-driver-podman
      - nomad-autoscaler
      - consul-cni
    state: present

- name: Get {{ nomad.user.name }} UID
  ansible.builtin.command: id -u {{ nomad.user.name }}
  register: nomad_uid
  changed_when: false

- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ nomad.user.name }}"
    group: "{{ nomad.user.name }}"
    mode: "0755"
  loop:
    - /opt/nomad
    - /opt/nomad/data
    - /etc/nomad.d
    - /etc/nomad.d/certs
    - /opt/cni/bin

- name: Request Nomad certificate from Vault
  community.hashi_vault.vault_write:
    url: "{{ nomad_server.vault.addr }}"
    token: "{{ nomad_server.vault.root_token }}"
    path: pki/issue/nomad
    data:
      common_name: "{{ inventory_hostname }}"
      alt_names: "localhost,{{ ansible_hostname }},nomad.service.consul"
      ip_sans: "127.0.0.1,{{ ansible_default_ipv4.address }}"
  register: nomad_cert
  no_log: true

- name: Write Nomad certificate
  ansible.builtin.copy:
    dest: "{{ nomad.vault.cert_file }}"
    content: "{{ nomad_cert.data.data.certificate }}"
    owner: "{{ nomad.user.name }}"
    group: "{{ nomad.user.name }}"
    mode: "0644"

- name: Write CA certificate
  ansible.builtin.copy:
    dest: "{{ nomad.vault.ca_file }}"
    content: "{{ nomad_cert.data.data.issuing_ca }}"
    owner: "{{ nomad.user.name }}"
    group: "{{ nomad.user.name }}"
    mode: "0644"

- name: Write Nomad private key
  ansible.builtin.copy:
    dest: "{{ nomad.vault.key_file }}"
    content: "{{ nomad_cert.data.data.private_key }}"
    owner: "{{ nomad.user.name }}"
    group: "{{ nomad.user.name }}"
    mode: "0640"

- name: Ensure Vault is reachable
  ansible.builtin.uri:
    url: "{{ nomad_server.vault.addr }}/v1/sys/health"
    method: GET
  register: vault_health
  retries: 10
  delay: 5
  until: vault_health.status == 200

- name: Create Nomad policy in Vault
  ansible.builtin.shell: |
    vault policy write nomad-cluster - <<'EOF'
    path "secret/data/nomad/*" {
      capabilities = ["read", "list"]
    }

    path "pki_int/issue/nomad" {
      capabilities = ["create", "update"]
    }
    EOF
    touch /tmp/nomad_policy_created
  environment:
    VAULT_ADDR: "{{ nomad_server.vault.addr }}"
    VAULT_TOKEN: "{{ nomad_server.vault.root_token }}"
  args:
    creates: /tmp/nomad_policy_created
  register: nomad_policy

- name: Create Nomad token in Vault
  ansible.builtin.command: vault token create -policy="nomad-cluster" -format=json
  environment:
    VAULT_ADDR: "{{ nomad_server.vault.addr }}"
    VAULT_TOKEN: "{{ nomad_server.vault.root_token }}"
  register: vault_nomad_token_json
  no_log: true

- name: Set vault_nomad_token fact
  ansible.builtin.set_fact:
    vault_nomad_token: "{{ (vault_nomad_token_json.stdout | from_json).auth.client_token }}"

- name: Nomad config
  ansible.builtin.template:
    src: ../templates/nomad.hcl.j2
    dest: /etc/nomad.d/nomad.hcl
    owner: "{{ nomad.user.name }}"
    group: "{{ nomad.user.name }}"
    mode: "0644"

- name: Enable and start system Podman socket (Required for Nomad driver)
  ansible.builtin.systemd:
    name: podman.socket
    enabled: true
    state: started

- name: Enable and start Nomad service
  ansible.builtin.systemd:
    name: nomad.service
    enabled: true
    state: restarted
    daemon_reload: true
    no_block: false

- name: Wait for Nomad API (Using HTTPS)
  ansible.builtin.uri:
    url: "https://127.0.0.1:4646/v1/status/leader" # <--- Changed to HTTPS
    validate_certs: false
  register: nomad_api
  retries: 20
  delay: 3
  until: nomad_api.status == 200
  changed_when: false

- name: Bootstrap Nomad ACLs
  ansible.builtin.command: nomad acl bootstrap -json
  environment:
    NOMAD_ADDR: "https://127.0.0.1:4646"
    NOMAD_CACERT: "{{ nomad.vault.ca_file }}"
  register: nomad_acl_bootstrap
  failed_when:
    - nomad_acl_bootstrap.rc != 0
    - "'ACL bootstrap already done' not in nomad_acl_bootstrap.stderr"
  changed_when: nomad_acl_bootstrap.rc == 0

- name: Save Nomad bootstrap token to file
  ansible.builtin.copy:
    content: "{{ nomad_acl_bootstrap.stdout }}"
    dest: /etc/nomad.d/nomad-management-token.json
    owner: "{{ nomad.user.name }}"
    group: "{{ nomad.user.name }}"
    mode: "0600"
  when: nomad_acl_bootstrap.rc == 0

- name: Read current Nomad bootstrap token
  ansible.builtin.slurp:
    src: /etc/nomad.d/nomad-management-token.json
  register: nomad_token_file

- name: Set Nomad token fact
  ansible.builtin.set_fact:
    nomad_management_token: "{{ (nomad_token_file.content | b64decode | from_json).SecretID }}"

- name: Check Nomad service status
  ansible.builtin.command: nomad status
  environment:
    NOMAD_ADDR: "https://127.0.0.1:4646"
    NOMAD_CACERT: "{{ nomad.vault.ca_file }}"
    NOMAD_TOKEN: "{{ nomad_management_token }}" # <--- This fixes the 403!
  register: nomad_status
  changed_when: false
  no_log: true

- ansible.builtin.debug:
    msg: >
      Nomad service status: {{ nomad_status.stdout }}
      Nomad API status: {{ nomad_api.status }}
      Nomad Leader: {{ nomad_api.json | default('Unknown') }}
