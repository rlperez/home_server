---
- name: Install Vault
  become: true
  dnf5:
    name: vault
    state: present

- name: Get {{ vault.user.name }} UID
  command: id -u {{ vault.user.name }}
  register: vault_uid
  changed_when: false

- name: Create directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vault.user.name }}"
    group: "{{ vault.user.group }}"
    mode: "0755"
  loop:
    - /etc/vault.d
    - /opt/vault/data

- name: Vault config
  template:
    src: ../templates/vault.hcl.j2
    dest: /etc/vault.d/vault.hcl

- name: Enable and start Vault service
  systemd:
    name: vault.service
    enabled: true
    state: started
    daemon_reload: yes
    no_block: false

- name: Wait for Vault API
  uri:
    url: "{{ nomad_server.vault.addr }}/v1/sys/health"
    method: GET
  register: vault_health
  retries: 20
  delay: 3
  until: vault_health.status != -1
  failed_when: false
  changed_when: false

- name: Check Vault status
  command: vault status -format=json
  environment:
    VAULT_ADDR: "{{ nomad_server.vault.addr }}"
  register: vault_status
  changed_when: false
  failed_when: false

- debug:
    msg: >
      Vault Status:
      {{ vault_status.stdout }}

- name: Check Vault service registration in Consul
  shell: consul catalog services
  register: consul_services
  changed_when: false
  failed_when: "'vault' not in consul_services.stdout"

- debug:
    msg: "Vault registered services: {{ consul_services.stdout }}"
