---
- name: Install Nomad
  become: true
  ansible.builtin.dnf5:
    name:
      - nomad
      - nomad-driver-podman
      - nomad-autoscaler
      - consul-cni
      - containernetworking-plugins
    state: present

- name: Get UID for {{ nomad_user.name }}
  ansible.builtin.command: id -u {{ nomad_user.name }}
  register: nomad_uid
  changed_when: false

- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ nomad_user.name }}"
    group: "{{ nomad_user.name }}"
    mode: "0755"
  loop:
    - /opt/nomad
    - /opt/nomad/data
    - /etc/nomad.d
    - /etc/nomad.d/certs
    - /opt/cni/bin

- name: Check if Nomad Vault token file exists
  ansible.builtin.stat:
    path: /etc/nomad.d/vault-token.txt
  register: nomad_vault_token_file

- name: Create Nomad token in Vault
  ansible.builtin.command: >
    vault token create
    -policy=nomad-cluster
    -orphan
    -renewable=true
    -format=json
  environment:
    VAULT_ADDR: "{{ nomad_server.vault.addr }}"
  register: nomad_vault_token_json
  changed_when: true
  when: not nomad_vault_token_file.stat.exists
  no_log: true

- name: Save Nomad Vault token to file
  ansible.builtin.copy:
    content: "{{ (nomad_vault_token_json.stdout | from_json).auth.client_token }}"
    dest: /etc/nomad.d/vault-token.txt
    owner: "{{ nomad_user.name }}"
    group: "{{ nomad_user.name }}"
    mode: "0600"
  when:
    - not nomad_vault_token_file.stat.exists
    - nomad_acl_bootstrap.rc | default(1) == 0
  no_log: true

- name: Read Nomad Vault token from file
  ansible.builtin.slurp:
    src: /etc/nomad.d/vault-token.txt
  register: nomad_vault_token_b64
  no_log: true

- name: Set nomad_vault_token fact
  ansible.builtin.set_fact:
    nomad_vault_token: "{{ nomad_vault_token_b64.content | b64decode }}"
  no_log: true

- name: Nomad config
  ansible.builtin.template:
    src: "{{ role_path }}/templates/nomad.hcl.j2"
    dest: /etc/nomad.d/nomad.hcl
    owner: "{{ nomad_user.name }}"
    group: "{{ nomad_user.name }}"
    mode: "0644"

- name: Enable and start system Podman socket (Required for Nomad driver)
  ansible.builtin.systemd:
    name: podman.socket
    enabled: true
    state: started

- name: Enable and start Nomad service
  ansible.builtin.systemd:
    name: nomad.service
    enabled: true
    state: restarted
    daemon_reload: true
    no_block: false

- name: Wait for Nomad API (Using HTTPS)
  ansible.builtin.uri:
    url: "{{ nomad_server.nomad.addr }}/v1/status/leader"
    validate_certs: false
  register: nomad_api
  retries: 20
  delay: 3
  until: nomad_api.status == 200
  changed_when: false

- name: Check if Nomad bootstrap token exists
  ansible.builtin.stat:
    path: "{{ nomad_server.nomad.acl.bootstrap_token_file }}"
  register: token_file

- name: Bootstrap Nomad ACLs
  ansible.builtin.command: nomad acl bootstrap -json
  environment:
    NOMAD_ADDR: "{{ nomad_server.nomad.addr }}"
    NOMAD_CACERT: "{{ nomad_server.nomad.vault.ca_file }}"
  register: nomad_acl_bootstrap
  when: not token_file.stat.exists
  failed_when:
    - nomad_acl_bootstrap.rc != 0
    - "'ACL bootstrap already done' not in nomad_acl_bootstrap.stderr"
  changed_when: nomad_acl_bootstrap.rc == 0

- name: Save Nomad bootstrap token to file
  ansible.builtin.copy:
    content: "{{ nomad_acl_bootstrap.stdout }}"
    dest: "{{ nomad_server.nomad.acl.bootstrap_token_file }}"
    owner: "{{ nomad_user.name }}"
    group: "{{ nomad_user.name }}"
    mode: "0600"
  when:
    - not token_file.stat.exists
    - nomad_acl_bootstrap.rc | default(1) == 0

- name: Read current Nomad bootstrap token
  ansible.builtin.slurp:
    src: "{{ nomad_server.nomad.acl.bootstrap_token_file }}"
  register: nomad_token_file

- name: Set Nomad token fact
  ansible.builtin.set_fact:
    nomad_management_token: "{{ (nomad_token_file.content | b64decode | from_json).SecretID }}"

- name: Check Nomad service status
  ansible.builtin.command: nomad status
  environment:
    NOMAD_ADDR: "{{ nomad_server.nomad.addr }}"
    NOMAD_CACERT: "{{ nomad_server.nomad.vault.ca_file }}"
    NOMAD_TOKEN: "{{ nomad_management_token }}"
  register: nomad_status
  changed_when: false
  no_log: true

- name: Debug Nomad service status
  ansible.builtin.debug:
    msg: >
      Nomad service status: {{ nomad_status.stdout }}
      Nomad API status: {{ nomad_api.status }}
      Nomad Leader: {{ nomad_api.json | default('Unknown') }}

- name: Set vault password file location fact
  ansible.builtin.set_fact:
    vault_pass_file: "{{ lookup('env', 'PWD') }}/.vault_pass"

- name: Set secrets file location fact
  ansible.builtin.set_fact:
    secrets_file: "{{ lookup('env', 'PWD') }}/inventory/nomad_servers/secrets.yml"

- name: Create a secure temporary file
  ansible.builtin.tempfile:
    state: file
    suffix: .yml
  delegate_to: localhost
  run_once: true
  register: temp_secrets

- name: Decrypt secrets to temporary file
  ansible.builtin.command:
    cmd: >
      ansible-vault decrypt
      --vault-password-file {{ vault_pass_file }}
      --output {{ temp_secrets.path }}
      {{ `` }}
  delegate_to: localhost
  run_once: true
  no_log: true

- name: Load decrypted YAML
  ansible.builtin.set_fact:
    vault_data: "{{ lookup('file', secrets_file.path) | from_yaml }}"
  no_log: true
  run_once: true
  delegate_to: localhost

- name: Update nomad management token key
  ansible.builtin.set_fact:
    updated_data: >
      {{
        vault_data | combine(
          {
            'secrets': {
              'nomad': {
                'token': nomad_management_token.stdout | trim
              }
            }
          },
          recursive=True
        )
      }}
  no_log: true
  delegate_to: localhost
  run_once: true

- name: Write updated YAML to temporary file
  ansible.builtin.copy:
    content: "{{ updated_data | to_nice_yaml }}"
    dest: "{{ secrets_file.path }}"
    mode: "0600"
  no_log: true
  delegate_to: localhost
  run_once: true

- name: Re-encrypt the temporary file
  ansible.builtin.command:
    cmd: >
      ansible-vault encrypt
      --vault-password-file {{ vault_pass_file }}
      {{ secrets_file.path }}
  no_log: true
  delegate_to: localhost
  run_once: true

- name: Move encrypted temp file back to original location
  ansible.builtin.copy:
    src: "{{ secrets_file.path }}"
    dest: "{{ secrets_file }}"
    remote_src: yes
    mode: "0600"
  no_log: true
  delegate_to: localhost
  run_once: true

- name: Reload secrets to get new token
  ansible.builtin.include_vars:
    file: "{{ secrets_file }}"
    name: secrets

- name: Cleanup management token file
  ansible.builtin.file:
    path: "{{ nomad_server.nomad.acl.bootstrap_token_file }}"
    state: absent
  run_once: true

- name: Cleanup temporary file
  ansible.builtin.file:
    path: "{{ temp_secrets.path }}"
    state: absent
  delegate_to: localhost
  run_once: true

- name: Check Nomad service status
  ansible.builtin.command: nomad status
  environment:
    NOMAD_ADDR: "{{ nomad_server.nomad.addr }}"
    NOMAD_CACERT: "{{ nomad_server.nomad.vault.ca_file }}"
    NOMAD_TOKEN: "{{ secrets.nomad.token }}"
  register: nomad_status
  changed_when: false
  no_log: true

- name: Debug Nomad service status
  ansible.builtin.debug:
    msg: >
      Nomad service status: {{ nomad_status.stdout }}
      Nomad API status: {{ nomad_api.status }}
      Nomad Leader: {{ nomad_api.json | default('Unknown') }}
